name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Pobranie kodu repozytorium
        uses: actions/checkout@v4

      - name: Instalacja narzędzia uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Instalacja pythona
        run: uv python install

      - name: Instalacja zależności projektu
        run: uv sync

      - name: Uruchomienie testów (pytest)
        run: uv run pytest tests/